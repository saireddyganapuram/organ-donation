<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Details Form</title>
    <link rel="stylesheet" href="/css/organsearch.css">
</head>
<body>

    <div class="container">
        <h1>Patient Details Form</h1>
        
        <form action="/coordinators/services/organsearch" method="post" enctype="multipart/form-data">
            <label for="patient_name">Patient Name</label>
            <input type="text" id="patient_name" name="name" required>
            
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="0" max="120" required>
            
            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>

            <label for="aadhaar">Aadhaar Number</label>
            <input type="text" id="aadhaar" name="aadhaar" pattern="\d{12}" maxlength="12" required>
            
            <label for="mobile">Mobile Number</label>
            <input type="tel" id="mobile" name="mobile" pattern="[0-9]{10}" required>

            <label for="medical_report">Upload Medical Report</label>
            <input type="file" id="medical_report" name="medicalReport" accept="application/pdf" required>

            <button type="submit" class="next-btn" id="next-btn">Next</button>
        </form>
    </div>

</body>
</html>
