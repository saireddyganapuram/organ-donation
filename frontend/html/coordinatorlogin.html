<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinator Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .login-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .login-container h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .login-button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .login-button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Coordinator Login</h1>
        <form onsubmit="validateLogin(event)">
            <div class="input-group">
                <label for="coordinator-id">Coordinator ID</label>
                <input type="text" id="coordinatorid" name="coordinatorid" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-button">Login</button>
            <p id="error-msg" style="color: red; margin-top: 10px;"></p>
        </form>
    </div>

    <script>
        function validateLogin(event) {
            event.preventDefault(); // Prevent the form from submitting
            
            var coordinatorid = document.getElementById('coordinatorid').value;
            var password = document.getElementById('password').value;
            var errorMsg = document.getElementById('error-msg');

            if (coordinatorid === 'mrec' && password === 'it') {
                window.location.replace("coordinatorpage.html"); 
            } else {
                errorMsg.innerText = 'Invalid username or password';
            }
        }
    </script>

</body>
</html>
