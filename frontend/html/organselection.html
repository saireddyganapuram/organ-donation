<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Organ and Hospitals/NGOs</title>
    <link rel="stylesheet" href="../css/organselection.css">
</head>
<body>

    <div class="container">
        <h1>Select Organ Type</h1>

        <div class="form-group">
            <label for="organ">Select Organ</label>
            <select id="organ" name="organ" onchange="showAvailableOptions()" required>
                <option value="">Select Organ</option>
                <option value="heart">Heart</option>
                <option value="kidneys">Kidneys</option>
                <option value="liver">Liver</option>
                <option value="lungs">Lungs</option>
                <option value="pancreas">Pancreas</option>
                <option value="eyes">Eyes</option>
            </select>
        </div>

        <div id="resultSection" style="display:none;">
            <h2>Available Hospitals</h2>
            <div>
                <label><input type="checkbox" id="selectAllHospitals" onclick="selectAll('hospitalList', 'selectAllHospitals')"> Select All Hospitals</label>
                <ul id="hospitalList" class="checkbox-group"></ul>
            </div>

            <h2>Available NGOs</h2>
            <div>
                <label><input type="checkbox" id="selectAllNgos" onclick="selectAll('ngoList', 'selectAllNgos')"> Select All NGOs</label>
                <ul id="ngoList" class="checkbox-group"></ul>
            </div>

            <button class="btn" onclick="sendRequest()">Send Request</button>
        </div>
    </div>

    <script>
        const organData = {
            heart: {
                hospitals: ["Apollo Hospital", "Fortis Hospital", "AIIMS"],
                ngos: ["Red Cross", "Organ India", "Donate Life"]
            },
            kidneys: {
                hospitals: ["Max Hospital", "Medanta Hospital", "NIMS Hospital"],
                ngos: ["Organ India", "Donate Life", "Save Organs Foundation"]
            },
            liver: {
                hospitals: ["Gandhi Hospital", "AIG Hospital", "Care Hospital"],
                ngos: ["Red Cross", "Save Life Foundation", "Donate Life"]
            },
            lungs: {
                hospitals: ["Gandhi Hospital", "AIG Hospital", "Care Hospital"],
                ngos: ["Organ India", "Donate Life", "Red Cross"]
            },
            pancreas: {
                hospitals: ["Apollo Hospital", "Yashoda Hospital", "Gleneagles"],
                ngos: ["Donate Life", "Organ India", "Red Cross"]
            },
            eyes: {
                hospitals: ["Agarwals Health", "LV Prasad Hospital", "Centerforsight"],
                ngos: ["Save Organs Foundation", "Donate Life", "Red Cross"]
            }
        };

        function sendRequest() {
            const selectedHospitals = Array.from(document.querySelectorAll('#hospitalList input:checked'))
            .map(cb => cb.parentElement.textContent.trim());
            const selectedNgos = Array.from(document.querySelectorAll('#ngoList input:checked'))
            .map(cb => cb.parentElement.textContent.trim());

            if (selectedHospitals.length === 0 && selectedNgos.length === 0) {
                alert("Please select at least one hospital or NGO to send the request.");
            } else {
                // Handle your request submission logic here (e.g., AJAX or form submission)
                console.log("Selected Hospitals:", selectedHospitals);
                console.log("Selected NGOs:", selectedNgos);

                // After successfully sending the request, redirect to the success page
                window.location.href = "../html/request_success.html";
            }
        }


        function showAvailableOptions() {
            const organ = document.getElementById('organ').value;
            const hospitalList = document.getElementById('hospitalList');
            const ngoList = document.getElementById('ngoList');
            const resultSection = document.getElementById('resultSection');

            // Clear previous lists
            hospitalList.innerHTML = '';
            ngoList.innerHTML = '';

            if (organ) {
                resultSection.style.display = 'block';

                // Populate hospital list
                organData[organ].hospitals.forEach(hospital => {
                    const listItem = document.createElement('li');
                    listItem.innerHTML = `<label><input type="checkbox" class="hospitalCheckbox"> ${hospital}</label>`;
                    hospitalList.appendChild(listItem);
                });

                // Populate NGO list
                organData[organ].ngos.forEach(ngo => {
                    const listItem = document.createElement('li');
                    listItem.innerHTML = `<label><input type="checkbox" class="ngoCheckbox"> ${ngo}</label>`;
                    ngoList.appendChild(listItem);
                });
            } else {
                resultSection.style.display = 'none';
            }
        }

        function selectAll(listId, selectAllId) {
            const checkboxes = document.querySelectorAll(`#${listId} input[type="checkbox"]`);
            const selectAllCheckbox = document.getElementById(selectAllId);
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAllCheckbox.checked;
            });
        }

        function sendRequest() {
            const selectedHospitals = Array.from(document.querySelectorAll('#hospitalList input:checked'))
                .map(cb => cb.parentElement.textContent.trim());
            const selectedNgos = Array.from(document.querySelectorAll('#ngoList input:checked'))
                .map(cb => cb.parentElement.textContent.trim());

            if (selectedHospitals.length === 0 && selectedNgos.length === 0) {
                alert("Please select at least one hospital or NGO to send the request.");
            } else {
                // After successfully sending the request, redirect to the success page
                window.location.href = "../html/request_success.html";
            }
        }
    </script>

</body>
</html>
