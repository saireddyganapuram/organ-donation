<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="container">
    <h1>Login</h1>
    <form id="loginForm" action="/donors/login" method="post">
        <div class="input-container">
            <i class="fas fa-id-card"></i>
            <input type="text" id="aadhaar" name="aadhaar" required pattern="\d{12}" maxlength="12" placeholder="Enter your Aadhaar Number" required>
        </div>
        
        <div class="input-container">
            <i class="fas fa-phone"></i>
            <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}" placeholder="Enter your Phone Number" required>
        </div>
        
        <div class="input-container">
            <i class="fas fa-key"></i>
            <input type="text" id="otp" name="otp" required placeholder="Enter OTP" required>
        </div>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
